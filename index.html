<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>SAMFO</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0f0c07;overflow:hidden;}
#root{height:100vh;overflow:hidden;}
button:active{opacity:0.6;transform:scale(0.96);}
button{transition:opacity 0.12s,transform 0.12s;}
input:focus,textarea:focus,select:focus{border-color:#c9a84c!important;outline:none;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef} = React;
</script>
<script type="text/babel">

const MOTIFS=["Trouble à l'ordre public","Violence conjugale","Cambriolage","Accident de la route","Appel de détresse","Tapage nocturne","Fugue","Vol à la tire","Agression","Contrôle d'identité","Autre"];
const CR_TYPES=["Intervention terminée sans incident. Situation normalisée.","Procédure engagée. Transmission au service compétent.","Gardé à vue. Mis en cause présenté au OPJ.","Aucune infraction constatée. Départ des unités.","Victime prise en charge par les secours. Main courante établie.","Auteur interpellé et placé en garde à vue."];
const TYPES_APPEL=["Appel 17","Instructions hiérarchiques","Opération","Initiative"];
const TYPES_OP=["Opération visibilité","Sécurisation adresse","Passage cité / quartier sensible","Point israélite","Opération anti-rodéo","Ronde / Patrouille","Barrage filtrant","Autre"];
const STATUTS={en_cours:{label:"En cours",icon:"🟠",color:"#ff9500",bg:"rgba(255,149,0,0.12)"},termine:{label:"Terminée",icon:"🟢",color:"#4caf50",bg:"rgba(76,175,80,0.08)"},annule:{label:"Annulée",icon:"🔴",color:"#f44336",bg:"rgba(244,67,54,0.07)"}};
const EP={nom:"",prenom:"",ddn:"",ddn_saisie:"",sexe:"",majorite:"",lieu_naissance_dept:"",lieu_naissance_ville:"",lieu_naissance_pays:"",adresse_rue:"",adresse_ville:"",adresse_cp:"",adresse_pays:"",note:"",telephone:"",interpelle:null,photos:[]};
const EI={id:null,date:"",heure:"",sur_place_date:"",sur_place_heure:"",lieu:"",note_lieu:"",motif:"",type_appel:"",equipages_mission:[],personnes:[],compte_rendu:"",statut:"en_cours",fin_date:"",fin_heure:"",personnes_controlees:0,interpellations_fiche:0,amendes_redigees:0,pv_redige:null,pv_numero:"",createdAt:null};
const EQ={indicatif:"",officiers:0,grades:0,gardiens:0,feminins:0,vehicule:"Sérigraphié",vehicule_autre:"",immatriculation:"",equipements:[]};
const EV={id:null,date:"",heure_debut:"",heure_fin:"",equipages:[{...EQ}],interventions:[],operations:[],doleances:[],secteurs:[],interpellations:0,ps:0,controles:0,afd:0,pve:0,ta_routier:0,ta_incivilites:0,stupefiants:0,pv_saisine:null,pv_saisine_numero:"",tirs_mortier:false,tirs_mortier_detail:"",blesses:false,blesses_detail:"",problemes:"",compte_rendu_libre:"",createdAt:null};
const G="#c9a84c",GL="#e8c96a",BG="#0f0c07",TX="#f0e6cc";
const IS={width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,200,100,0.25)",borderRadius:8,color:TX,padding:"9px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
const LS={display:"block",fontSize:11,color:G,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4,fontWeight:600};
const BP={background:"linear-gradient(135deg,#c9a84c,#e8c96a)",border:"none",borderRadius:10,color:"#1a1206",fontWeight:700,fontSize:15,padding:"13px 0",cursor:"pointer",width:"100%",fontFamily:"inherit"};
const BS={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,200,100,0.3)",borderRadius:8,color:G,fontSize:13,padding:"8px 14px",cursor:"pointer",fontFamily:"inherit"};
const uid=()=>Date.now()+Math.floor(Math.random()*9999);
const nowD=()=>new Date().toISOString().split("T")[0];
const nowH=()=>new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
const calcAge=ddn=>{if(!ddn)return null;const a=Math.floor((new Date()-new Date(ddn))/(365.25*24*3600*1000));return(isNaN(a)||a<0||a>120)?null:a;};
function syncCR(v){const t=(v.interventions||[]).filter(i=>i.statut==="termine");return{...v,interpellations:t.reduce((a,i)=>a+(i.interpellations_fiche||0),0),ps:t.filter(i=>i.type_appel==="Appel 17").length,controles:t.reduce((a,i)=>a+(i.personnes_controlees||0),0),afd:t.reduce((a,i)=>a+(i.amendes_redigees||0),0)};}
function ST({icon,title}){return(<div style={{display:"flex",alignItems:"center",gap:8,margin:"18px 0 10px"}}><span style={{fontSize:16}}>{icon}</span><span style={{fontSize:12,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.1em"}}>{title}</span><div style={{flex:1,height:1,background:"rgba(201,168,76,0.2)",marginLeft:4}}/></div>);}
function Badge({statut}){const s=STATUTS[statut]||STATUTS.en_cours;return <span style={{background:"rgba(0,0,0,0.3)",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,color:s.color,border:"1px solid "+s.color}}>{s.icon} {s.label}</span>;}
function Toast({msg}){if(!msg)return null;return <div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:"#1a2a1a",border:"1px solid #4a8a4a",color:"#9effa0",borderRadius:20,padding:"10px 22px",fontSize:14,fontWeight:600,zIndex:300,whiteSpace:"nowrap"}}>{msg}</div>;}
function CI({value,onChange,placeholder,type="text",multi=false,rows=3}){return(<div style={{position:"relative",width:"100%"}}>{multi?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={rows} placeholder={placeholder} style={{...IS,resize:"vertical",lineHeight:1.5,paddingRight:value?30:12}}/>:<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{...IS,paddingRight:value?30:12}}/>}{!!value&&<button onClick={()=>onChange("")} style={{position:"absolute",right:8,top:multi?12:"50%",transform:multi?"none":"translateY(-50%)",background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:18,height:18,cursor:"pointer",color:"#aaa",fontSize:10,padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}</div>);}
function Counter({label,value,onChange,icon=""}){return(<div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,100,0.2)",borderRadius:8,padding:"10px 12px",marginBottom:8}}>{icon&&<span>{icon}</span>}<span style={{flex:1,color:G,fontSize:13,fontWeight:600}}>{label}</span><button onClick={()=>onChange(Math.max(0,(value||0)-1))} style={{...BS,padding:"4px 10px",fontSize:16}}>−</button><input type="number" min="0" value={value||0} onChange={e=>onChange(Math.max(0,parseInt(e.target.value)||0))} style={{width:52,textAlign:"center",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,200,100,0.2)",borderRadius:6,color:GL,padding:"5px 4px",fontSize:16,fontWeight:700,outline:"none"}}/><button onClick={()=>onChange((value||0)+1)} style={{background:"rgba(201,168,76,0.2)",border:"1px solid rgba(255,200,100,0.4)",borderRadius:6,color:GL,fontSize:16,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}}>＋</button></div>);}
function OuiNon({label,value,onChange,icon=""}){return(<div style={{marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,100,0.2)",borderRadius:8,padding:"10px 12px"}}>{icon&&<span>{icon}</span>}<span style={{flex:1,color:G,fontSize:13,fontWeight:600}}>{label}</span>{["Oui","Non"].map(v=>{const s=value===(v==="Oui");return(<button key={v} onClick={()=>onChange(v==="Oui")} style={{padding:"5px 14px",borderRadius:8,border:s?"1.5px solid "+(v==="Oui"?"#4caf50":"#f44336"):"1px solid rgba(255,255,255,0.15)",background:s?v==="Oui"?"rgba(76,175,80,0.15)":"rgba(244,67,54,0.12)":"rgba(255,255,255,0.03)",color:s?v==="Oui"?"#7ddd80":"#ff7070":"#888",fontWeight:s?700:400,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>{v}</button>);})}</div></div>);}
function Accordion({motif,onSelect}){const[open,setOpen]=useState(false);return(<div style={{marginBottom:10}}><button onClick={()=>setOpen(o=>!o)} style={{width:"100%",textAlign:"left",padding:"10px 14px",borderRadius:open?"8px 8px 0 0":8,border:"1px solid rgba(255,200,100,0.25)",background:open?"rgba(201,168,76,0.12)":"rgba(255,255,255,0.04)",color:G,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>Motifs pré-enregistrés</span><span>{open?"▲":"▼"}</span></button>{open&&<div style={{border:"1px solid rgba(255,200,100,0.2)",borderTop:"none",borderRadius:"0 0 8px 8px",overflow:"hidden"}}>{MOTIFS.filter(m=>m!=="Autre").map((m,i)=>(<button key={m} onClick={()=>{onSelect(m);setOpen(false);}} style={{display:"block",width:"100%",textAlign:"left",padding:"11px 14px",border:"none",borderTop:i>0?"1px solid rgba(255,255,255,0.05)":"none",background:motif===m?"rgba(201,168,76,0.14)":"rgba(255,255,255,0.03)",color:motif===m?GL:"#bbb",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:motif===m?700:400}}>{motif===m?"✔ ":"› "}{m}</button>))}</div>}</div>);}

function PhotoSec({p,idx,upd,toast}){
  const ref=useRef();
  const[busy,setBusy]=useState(false);
  const onFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{upd(idx,"photos",[...(p.photos||[]),{id:uid(),dataUrl:ev.target.result,date:new Date().toISOString()}]);toast("Photo ajoutée");};r.readAsDataURL(f);e.target.value="";};
  const analyze=async(photo,pi)=>{
    setBusy(true);
    try{
      const b64=photo.dataUrl.split(",")[1],mime=photo.dataUrl.split(";")[0].split(":")[1];
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:'JSON only no backticks: {"nom":"","prenom":"","ddn":"","lieu_naissance_ville":"","lieu_naissance_pays":""}\nddn=YYYY-MM-DD'}]}]})});
      const d=await res.json();
      const txt=(d.content?.find(b=>b.type==="text")?.text||"").trim();
      const obj=JSON.parse(txt);
      if(obj.nom)upd(idx,"nom",obj.nom);if(obj.prenom)upd(idx,"prenom",obj.prenom);if(obj.ddn)upd(idx,"ddn",obj.ddn);if(obj.lieu_naissance_ville)upd(idx,"lieu_naissance_ville",obj.lieu_naissance_ville);if(obj.lieu_naissance_pays)upd(idx,"lieu_naissance_pays",obj.lieu_naissance_pays);toast("Champs remplis !");
    }catch{toast("Analyse échouée");}
    setBusy(false);
  };
  const rm=pi=>upd(idx,"photos",(p.photos||[]).filter((_,i)=>i!==pi));
  const photos=p.photos||[];
  return(<div><input ref={ref} type="file" accept="image/*" capture="environment" onChange={onFile} style={{display:"none"}}/><button onClick={()=>ref.current.click()} style={{...BS,width:"100%",padding:"11px 0",marginBottom:10}}>📷 Ajouter une photo</button>{photos.length===0&&<p style={{color:"#555",fontSize:12,textAlign:"center"}}>Aucune photo</p>}<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>{photos.map((ph,pi)=>(<div key={ph.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid rgba(255,200,100,0.15)"}}><img src={ph.dataUrl} alt="" style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/><div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",flexDirection:"column",justifyContent:"space-between",padding:4}}><button onClick={()=>rm(pi)} style={{alignSelf:"flex-end",background:"rgba(220,50,50,0.8)",border:"none",borderRadius:"50%",width:20,height:20,color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button><button onClick={()=>analyze(ph,pi)} disabled={busy} style={{background:"rgba(201,168,76,0.85)",border:"none",borderRadius:5,color:"#111",fontSize:9,fontWeight:700,cursor:"pointer",padding:"3px 4px"}}>{busy?"...":"ID"}</button></div></div>))}</div></div>);
}

function PersonneCard({p,idx,upd,rm,toast}){
  const[sub,setSub]=useState("infos");
  const nb=(p.photos||[]).length;
  return(<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,100,0.2)",borderRadius:10,padding:14,marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <select value={p.type||"Requérant"} onChange={e=>upd(idx,"type",e.target.value)} style={{...IS,flex:1,marginRight:8,cursor:"pointer"}}>{["Requérant","Auteur","Victime","Témoin"].map(t=><option key={t}>{t}</option>)}</select>
      <button onClick={()=>rm(idx)} style={{background:"rgba(255,80,80,0.15)",border:"1px solid rgba(255,80,80,0.4)",color:"#ff6060",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:13}}>✕</button>
    </div>
    <div style={{display:"flex",borderBottom:"1px solid rgba(255,200,100,0.15)",marginBottom:12}}>
      {[{id:"infos",t:"👤 Infos"},{id:"photos",t:"📷"+(nb>0?" ("+nb+")":"")}].map(x=>(<button key={x.id} onClick={()=>setSub(x.id)} style={{flex:1,padding:"8px 4px",background:sub===x.id?"rgba(201,168,76,0.08)":"transparent",border:"none",borderBottom:sub===x.id?"2px solid #c9a84c":"2px solid transparent",color:sub===x.id?GL:"#666",fontSize:13,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>{x.t}</button>))}
    </div>
    {sub==="infos"&&<div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {["Homme","Femme"].map(s=>(<button key={s} onClick={()=>upd(idx,"sexe",s)} style={{flex:1,padding:"7px 0",borderRadius:8,border:p.sexe===s?"1.5px solid #c9a84c":"1px solid rgba(255,255,255,0.15)",background:p.sexe===s?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)",color:p.sexe===s?GL:"#888",fontWeight:p.sexe===s?700:400,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>{p.sexe===s?"✔ ":""}{s}</button>))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div><label style={LS}>Nom</label><CI value={p.nom} onChange={v=>upd(idx,"nom",v)} placeholder="Nom"/></div>
        <div><label style={LS}>Prénom</label><CI value={p.prenom} onChange={v=>upd(idx,"prenom",v)} placeholder="Prénom"/></div>
      </div>
      <div style={{marginBottom:8}}>
        <label style={LS}>Date de naissance</label>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{flex:1,position:"relative"}}>
            <input type="text" inputMode="numeric"
              value={p.ddn_saisie!=null?p.ddn_saisie:(p.ddn?p.ddn.split("-").reverse().join("/"):"")}
              onChange={e=>{
                let v=e.target.value.split("").filter(c=>c>="0"&&c<="9").join("").substring(0,8);
                let f=v;
                if(v.length>4)f=v.substring(0,2)+"/"+v.substring(2,4)+"/"+v.substring(4);
                else if(v.length>2)f=v.substring(0,2)+"/"+v.substring(2);
                upd(idx,"ddn_saisie",f);
              }}
              onBlur={e=>{
                const raw=e.target.value.split("").filter(c=>c>="0"&&c<="9").join("");
                let j,mo,an;
                if(raw.length===8){j=raw.substring(0,2);mo=raw.substring(2,4);an=raw.substring(4,8);}
                else if(raw.length===6){j=raw.substring(0,2);mo=raw.substring(2,4);const aa=parseInt(raw.substring(4,6));an=String(aa<=(new Date().getFullYear()-2000)?2000+aa:1900+aa);}
                else return;
                const iso=an+"-"+mo+"-"+j;
                upd(idx,"ddn",iso);
                upd(idx,"ddn_saisie",j+"/"+mo+"/"+an);
                const age=calcAge(iso);
                if(!p.majorite&&age!==null)upd(idx,"majorite",age>=18?"majeur":"mineur");
              }}
              placeholder="JJ/MM/AA ou AAAA"
              style={{...IS,paddingRight:p.ddn?30:12}}
            />
            {p.ddn&&<button onClick={()=>{upd(idx,"ddn","");upd(idx,"ddn_saisie","");}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#aaa",fontSize:10,padding:0}}>✕</button>}
          </div>
          {p.ddn&&calcAge(p.ddn)!==null&&<div style={{background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.4)",borderRadius:8,padding:"6px 10px",color:"#e8c96a",fontWeight:700,fontSize:14,flexShrink:0,whiteSpace:"nowrap"}}>{calcAge(p.ddn)} ans</div>}
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {["Majeur","Mineur"].map(s=>(<button key={s} onClick={()=>upd(idx,"majorite",s.toLowerCase())} style={{flex:1,padding:"7px 0",borderRadius:8,border:p.majorite===s.toLowerCase()?"1.5px solid "+(s==="Mineur"?"#ff9500":"#4caf50"):"1px solid rgba(255,255,255,0.15)",background:p.majorite===s.toLowerCase()?s==="Mineur"?"rgba(255,149,0,0.15)":"rgba(76,175,80,0.12)":"rgba(255,255,255,0.03)",color:p.majorite===s.toLowerCase()?s==="Mineur"?"#ffb84d":"#7ddd80":"#888",fontWeight:p.majorite===s.toLowerCase()?700:400,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>{p.majorite===s.toLowerCase()?"✔ ":""}{s}</button>))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div><label style={LS}>Dép. naiss.</label><input type="number" value={p.lieu_naissance_dept||""} onChange={e=>upd(idx,"lieu_naissance_dept",e.target.value)} placeholder="75" style={IS}/></div>
        <div><label style={LS}>Ville naiss.</label><CI value={p.lieu_naissance_ville||""} onChange={v=>upd(idx,"lieu_naissance_ville",v)} placeholder="Ville"/></div>
      </div>
      <div style={{marginBottom:8}}><label style={LS}>Pays naiss.</label><CI value={p.lieu_naissance_pays||""} onChange={v=>upd(idx,"lieu_naissance_pays",v)} placeholder="Pays"/></div>
      <div style={{marginBottom:8}}><label style={LS}>Adresse — Rue</label><CI value={p.adresse_rue||""} onChange={v=>upd(idx,"adresse_rue",v)} placeholder="Numéro et rue"/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div><label style={LS}>Code postal</label><input type="number" value={p.adresse_cp||""} onChange={e=>upd(idx,"adresse_cp",e.target.value)} placeholder="75000" style={IS}/></div>
        <div><label style={LS}>Ville</label><CI value={p.adresse_ville||""} onChange={v=>upd(idx,"adresse_ville",v)} placeholder="Ville"/></div>
      </div>
      <div style={{marginBottom:8}}><label style={LS}>Pays</label><CI value={p.adresse_pays||""} onChange={v=>upd(idx,"adresse_pays",v)} placeholder="Pays"/></div>
      <div style={{marginBottom:8}}><label style={LS}>Téléphone</label><input type="tel" autoComplete="off" value={p.telephone||""} onChange={e=>upd(idx,"telephone",e.target.value)} placeholder="06 12 34 56 78" style={IS}/></div>
      <div style={{marginBottom:p.type==="Auteur"?8:0}}><label style={LS}>Note</label><CI value={p.note||""} onChange={v=>upd(idx,"note",v)} placeholder="Remarque..." multi rows={2}/></div>
      {p.type==="Auteur"&&<div style={{background:"rgba(255,149,0,0.08)",border:"1px solid rgba(255,149,0,0.3)",borderRadius:8,padding:"10px 12px"}}>
        <label style={LS}>Interpellé ?</label>
        <div style={{display:"flex",gap:8}}>{["Oui","Non"].map(v=>{const s=p.interpelle===(v==="Oui");return(<button key={v} onClick={()=>upd(idx,"interpelle",v==="Oui")} style={{flex:1,padding:"8px 0",borderRadius:8,border:s?"1.5px solid "+(v==="Oui"?"#4caf50":"#f44336"):"1px solid rgba(255,255,255,0.15)",background:s?v==="Oui"?"rgba(76,175,80,0.15)":"rgba(244,67,54,0.12)":"rgba(255,255,255,0.03)",color:s?v==="Oui"?"#7ddd80":"#ff7070":"#888",fontWeight:s?700:400,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>{v}</button>);})}
        </div>
      </div>}
    </div>}
    {sub==="photos"&&<PhotoSec p={p} idx={idx} upd={upd} toast={toast}/>}
  </div>);
}

function VehSelector({eq,i,v,setV}){
  const updEq=(k,val)=>{const a=[...v.equipages];a[i]={...a[i],[k]:val};setV({...v,equipages:a});};
  if(eq.vehicule&&eq.vehicule!=="Sérigraphié"&&eq.vehicule!=="__autre__")return(<div style={{marginBottom:8}}><label style={LS}>Véhicule</label><div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(201,168,76,0.12)",border:"1.5px solid #c9a84c",borderRadius:8,padding:"9px 14px"}}><span style={{color:GL,fontWeight:700,flex:1}}>{eq.vehicule}</span><button onClick={()=>{const a=[...v.equipages];a[i]={...a[i],vehicule:"",vehicule_autre:""};setV({...v,equipages:a});}} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#aaa",fontSize:12,padding:0}}>✕</button></div></div>);
  return(<div style={{marginBottom:8}}><label style={LS}>Véhicule</label>
    {eq.vehicule!=="__autre__"&&<div style={{display:"flex",gap:8,marginBottom:8}}><button onClick={()=>updEq("vehicule","Sérigraphié")} style={{flex:1,padding:"9px 0",borderRadius:8,border:(eq.vehicule==="Sérigraphié"||!eq.vehicule)?"1.5px solid #c9a84c":"1px solid rgba(255,255,255,0.15)",background:(eq.vehicule==="Sérigraphié"||!eq.vehicule)?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)",color:(eq.vehicule==="Sérigraphié"||!eq.vehicule)?GL:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>Sérigraphié</button><button onClick={()=>updEq("vehicule","__autre__")} style={{flex:1,padding:"9px 0",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.03)",color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>Autre</button></div>}
    {eq.vehicule==="__autre__"&&<div><div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{["Moto","Vélo","Cyclomoteur","Piéton","Banalisé","Fourgon"].map(lb=>(<button key={lb} onClick={()=>updEq("vehicule",lb)} style={{padding:"7px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.03)",color:"#aaa",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>{lb}</button>))}</div><div style={{display:"flex",gap:8}}><input type="text" defaultValue={eq.vehicule_autre||""} onBlur={e=>{const val=e.target.value.trim();if(val)updEq("vehicule",val);}} placeholder="Autre moyen de transport..." style={{...IS,flex:1}}/><button onClick={e=>{const inp=e.target.previousSibling;if(inp&&inp.value.trim())updEq("vehicule",inp.value.trim());}} style={{...BS,flexShrink:0}}>✓</button></div></div>}
  </div>);
}

      </div>))}
      <button onClick={addEq} style={{...BS,width:"100%",marginTop:12,padding:"10px 0",fontSize:13}}>＋ Ajouter un équipage</button>
      <div style={{height:20}}/>
    </div>
    <div style={{flexShrink:0,padding:"12px 16px",background:BG,borderTop:"1px solid rgba(201,168,76,0.2)",display:"flex",gap:10}}>
      {onAnnuler&&<button onClick={onAnnuler} style={{...BS,flex:1,padding:"13px 0"}}>Annuler</button>}

function genTxt(m){
  const L=["Date : "+(m.date||"—"),"Heure : "+(m.heure||"—")];
  if(m.sur_place_heure)L.push("Sur place : "+m.sur_place_heure);
  if(m.type_appel)L.push("Type appel : "+m.type_appel);
  L.push("Lieu : "+(m.lieu||"—"),"Motif : "+(m.motif||"—"),"Statut : "+(STATUTS[m.statut]||STATUTS.en_cours).label,"");
  (m.personnes||[]).forEach((p,i)=>{L.push((p.type||"Personne")+" "+(i+1));if(p.sexe||p.majorite)L.push("  "+[p.sexe,p.majorite].filter(Boolean).join(", "));if(p.nom)L.push("  Nom : "+p.nom);if(p.prenom)L.push("  Prenom : "+p.prenom);if(p.ddn)L.push("  DDN : "+p.ddn);if(p.telephone)L.push("  Tel : "+p.telephone);L.push("");});
  if(m.compte_rendu)L.push("COMPTE RENDU","",m.compte_rendu,"");
  if(m.interpellations_fiche)L.push("Interpellations : "+m.interpellations_fiche);
  if(m.pv_redige===true)L.push("PV : Oui — N° "+(m.pv_numero||"?"));
  return L.join("\n");
}

function genCRGlobal(v){
  const eq=v.equipages[0]||{},tot=(eq.officiers||0)+(eq.grades||0)+(eq.gardiens||0);
  const L=["Compte rendu — "+v.date,"Équipage : "+(eq.indicatif||"—")+" | Effectif : "+tot+" dont "+(eq.feminins||0)+" féminins","Véhicule : "+(eq.vehicule||"—")+" — "+(eq.immatriculation||"—"),"Vacation : "+(v.heure_debut||"—")+" → "+(v.heure_fin||"—"),"","INTERPELLATIONS : "+(v.interpellations||0),"INTERVENTIONS PS : "+(v.ps||0),""];
  if((v.interventions||[]).length){L.push("MOTIFS :");(v.interventions||[]).forEach((m,i)=>{L.push("  "+(i+1)+". "+(m.motif||"—")+" — "+(m.lieu||"—")+" ["+(STATUTS[m.statut]||STATUTS.en_cours).label+"]");});L.push("");}
  if((v.operations||[]).length){L.push("OPÉRATIONS : "+v.operations.length);v.operations.forEach(o=>{L.push("  "+o.type+(o.adresse?" — "+o.adresse:"")+(o.heure_debut?" de "+o.heure_debut:"")+(o.heure_fin?" à "+o.heure_fin:""));});L.push("");}
  if((v.doleances||[]).length){L.push("DOLÉANCES :");v.doleances.forEach(d=>L.push("  "+d.adresse+" : "+(d.statut==="ras"?"RAS":d.observation||"Obs.")));L.push("");}
  if((v.secteurs||[]).length){L.push("SECTEURS :");v.secteurs.forEach(s=>L.push("  "+s.nom+(s.observation?" : "+s.observation:"")));L.push("");}
  L.push("AFD/PVE :","  TA routier : "+(v.ta_routier||0),"  TA incivilités : "+(v.ta_incivilites||0),"  AFD : "+(v.afd||0),"  PVe : "+(v.pve||0),"  PV saisine : "+(v.pv_saisine===true?"Oui — N°"+(v.pv_saisine_numero||"?"):v.pv_saisine===false?"Non":"—"),"  Contrôles : "+(v.controles||0),"  Stupéfiants : "+(v.stupefiants||0),"");
  if(v.tirs_mortier){L.push("TIRS DE MORTIER : Oui");if(v.tirs_mortier_detail)L.push("  "+v.tirs_mortier_detail);L.push("  Blessés : "+(v.blesses?"Oui":"Non"));L.push("");}
  L.push("Problèmes : "+(v.problemes||"Néant"));
  if(v.compte_rendu_libre)L.push("",v.compte_rendu_libre);
  return L.join("\n");
}

function OngletOps({vacation,onChange}){
  const[nOp,setNOp]=useState({id:uid(),type:"",type_manuel:"",adresse:"",heure_debut:"",heure_fin:"",observation:""});
  const[nDol,setNDol]=useState({id:uid(),adresse:"",statut:"ras",observation:""});
  const[nSect,setNSect]=useState({nom:"",observation:""});
  const addOp=()=>{if(!nOp.type)return;const tl=nOp.type==="autre_manuel"?(nOp.type_manuel||"Autre"):nOp.type;onChange(syncCR({...vacation,operations:[...vacation.operations,{...nOp,type:tl,id:uid()}]}));setNOp({id:uid(),type:"",type_manuel:"",adresse:"",heure_debut:"",heure_fin:"",observation:""});};
  const addDol=()=>{if(!nDol.adresse)return;onChange(syncCR({...vacation,doleances:[...vacation.doleances,{...nDol,id:uid()}]}));setNDol({id:uid(),adresse:"",statut:"ras",observation:""});};
  const addSect=()=>{if(!nSect.nom.trim())return;onChange({...vacation,secteurs:[...(vacation.secteurs||[]),{id:uid(),nom:nSect.nom.trim(),observation:nSect.observation.trim()}]});setNSect({nom:"",observation:""});};
  return(<div style={{paddingBottom:40}}>
    <ST icon="🗂" title="Opérations"/>
    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,200,100,0.2)",borderRadius:10,padding:14,marginBottom:12}}>

    <Counter label="AFD" value={vacation.afd} onChange={v=>onChange({...vacation,afd:v})} icon="💶"/>
    <Counter label="PVe" value={vacation.pve} onChange={v=>onChange({...vacation,pve:v})} icon="📄"/>
    <Counter label="TA routier" value={vacation.ta_routier} onChange={v=>onChange({...vacation,ta_routier:v})} icon="🚗"/>
    <Counter label="TA incivilités" value={vacation.ta_incivilites} onChange={v=>onChange({...vacation,ta_incivilites:v})} icon="⚠️"/>
    <Counter label="Saisies stupéfiants" value={vacation.stupefiants} onChange={v=>onChange({...vacation,stupefiants:v})} icon="💊"/>

      </div>

function RadioView({vacation,onClose}){
  return(<div style={{height:"100vh",display:"flex",flexDirection:"column",background:BG,color:TX}}>
    <div style={{background:"#1a1206",borderBottom:"1px solid rgba(201,168,76,0.3)",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
      <button onClick={onClose} style={{background:"none",border:"none",color:G,fontSize:20,cursor:"pointer",padding:0}}>←</button>
      <span style={{color:"#4caf50",fontWeight:700,fontSize:15}}>📻 Synthèse radio</span>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:16}}>
      {(vacation.equipages||[]).map((eq,i)=>{
        const off=eq.officiers||0,grd=eq.grades||0,gar=eq.gardiens||0,fem=eq.feminins||0;
        let parts=[];
        if(off>0){parts=[String(off),String(grd),String(gar)];}
        else if(grd===0&&gar>0){parts=["0",String(gar)];}
        else{if(grd>0)parts.push(String(grd));if(gar>0)parts.push(String(gar));}
        return(<div key={i} style={{background:"rgba(76,175,80,0.08)",border:"1px solid rgba(76,175,80,0.3)",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{color:"#7ddd80",fontWeight:700,fontSize:18,marginBottom:12}}>{eq.indicatif||"Équipage "+(i+1)}</div>
          <div style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:"12px 16px",marginBottom:12}}>
            <div style={{color:"#aaa",fontSize:11,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>Formule radio</div>
            <div style={{color:"#fff",fontWeight:700,fontSize:36}}>{parts.join("+")}</div>
            {fem>0&&<div style={{color:"#ffb84d",fontSize:14,marginTop:4}}>dont {fem} féminin{fem>1?"s":""}</div>}
          </div>
          {[["Officiers",off],["Gradés",grd],["Gardiens",gar]].map(([lb,val])=>(<div key={lb} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)",paddingBottom:6,marginBottom:6}}><span style={{color:"#888",fontSize:13}}>{lb}</span><span style={{color:TX,fontWeight:700}}>{val}</span></div>))}
          <div style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)",paddingBottom:6,marginBottom:6}}><span style={{color:"#888",fontSize:13}}>Véhicule</span><span style={{color:TX,fontWeight:700}}>{eq.vehicule||"—"}{eq.immatriculation?" — "+eq.immatriculation:""}</span></div>
          {(eq.equipements||[]).length>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#888",fontSize:13}}>Équipements</span><span style={{color:"#ffb84d",fontWeight:700}}>{eq.equipements.join(", ")}</span></div>}
        </div>);
      })}
    </div>
  </div>);
}

function TableauDeBord({vacation,onChange,onCloturer,showToast}){
  const[onglet,setOnglet]=useState("interventions");
  const[ecranFiche,setEcranFiche]=useState(false);
  const[fiche,setFiche]=useState(null);
  const[confirmRetour,setConfirmRetour]=useState(false);
  const[ecranEquipage,setEcranEquipage]=useState(false);
  const[confirmSync,setConfirmSync]=useState(null);
  const[ecranRadio,setEcranRadio]=useState(false);
  const[txtFiche,setTxtFiche]=useState(null);
  const ouvrirNouvelle=()=>{setFiche({...EI,id:uid(),date:vacation.date,heure:nowH()});setEcranFiche(true);setTxtFiche(null);};
  const ouvrirExistante=m=>{setFiche({...m});setEcranFiche(true);setTxtFiche(null);};
  const enregistrer=()=>{setFiche(f=>{const upd=[f,...vacation.interventions.filter(i=>i.id!==f.id)];onChange(syncCR({...vacation,interventions:upd}));return f;});setEcranFiche(false);setConfirmRetour(false);setTxtFiche(null);showToast("✅ Enregistrée !");};
  const delInterv=id=>{onChange(syncCR({...vacation,interventions:vacation.interventions.filter(i=>i.id!==id)}));showToast("Supprimée");};
  if(ecranRadio)return <RadioView vacation={vacation} onClose={()=>setEcranRadio(false)}/>;
  if(ecranEquipage)return <FormulaireVacation onValider={nv=>{setEcranEquipage(false);setConfirmSync(nv);}} onAnnuler={()=>setEcranEquipage(false)} vacationInitiale={vacation}/>;
  if(confirmSync){
    const anc=vacation.equipages[0]?.indicatif||"",nouv=confirmSync.equipages[0]?.indicatif||"";
    const nb=vacation.interventions.filter(i=>i.statut!=="termine").length;
    return(<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:BG,padding:24}}>
      <div style={{background:"#1a1206",border:"1px solid rgba(201,168,76,0.4)",borderRadius:14,padding:"24px 20px",width:"100%",maxWidth:380}}>
        <div style={{fontSize:16,fontWeight:700,color:GL,marginBottom:8}}>Mettre à jour les fiches actives ?</div>
        <p style={{color:"#ccc",fontSize:14,marginBottom:20,lineHeight:1.6}}>{nb} fiche(s) en cours. Appliquer le nouvel équipage ?</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={()=>{const im=vacation.interventions.map(i=>{if(i.statut==="termine")return i;return{...i,equipages_mission:(i.equipages_mission||[]).map(e=>e===anc?nouv:e)};});onChange(syncCR({...vacation,...confirmSync,interventions:im}));setConfirmSync(null);showToast("✅ Mis à jour !");}} style={{...BP,fontSize:14,padding:"12px 0"}}>Oui — Mettre à jour les fiches actives</button>
          <button onClick={()=>{onChange(syncCR({...vacation,...confirmSync}));setConfirmSync(null);showToast("✅ Équipage mis à jour !");}} style={{...BS,padding:"12px 0",textAlign:"center"}}>Non — Garder les fiches inchangées</button>
        </div>
      </div>
    </div>);

  if(ecranFiche&&fiche)return(<div style={{height:"100vh",display:"flex",flexDirection:"column",background:BG,color:TX,fontFamily:"'Georgia',serif"}}>

      <button onClick={()=>setConfirmRetour(true)} style={{...BS,padding:"6px 14px",fontSize:13}}>← Retour</button>
      <span style={{color:GL,fontWeight:700,fontSize:15}}>{fiche.createdAt?"Modifier":"Nouvelle intervention"}</span>
      <button onClick={enregistrer} style={{background:"linear-gradient(135deg,#c9a84c,#e8c96a)",border:"none",borderRadius:8,color:"#1a1206",fontSize:13,fontWeight:700,padding:"6px 16px",cursor:"pointer",fontFamily:"inherit"}}>💾 Enregistrer</button>
    </div>

      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>{[{lb:"Interv.",val:(vacation.interventions||[]).length,col:"#ff9500"},{lb:"Opérations",val:(vacation.operations||[]).length,col:"#4caf50"},{lb:"Doléances",val:(vacation.doleances||[]).length,col:G}].map(s=>(<div key={s.lb} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"6px 4px",textAlign:"center"}}><div style={{color:s.col,fontWeight:700,fontSize:18}}>{s.val}</div><div style={{color:"#777",fontSize:10}}>{s.lb}</div></div>))}</div>
      <div style={{display:"flex"}}>{[{id:"interventions",lb:"📋 Interventions"},{id:"operations",lb:"🗂 Opérations"},{id:"cr",lb:"📊 Compte rendu"}].map(t=>(<button key={t.id} onClick={()=>setOnglet(t.id)} style={{flex:1,padding:"9px 4px",background:onglet===t.id?"rgba(201,168,76,0.12)":"transparent",border:"none",borderBottom:onglet===t.id?"2px solid #c9a84c":"2px solid transparent",color:onglet===t.id?GL:"#666",fontWeight:onglet===t.id?700:400,fontSize:11,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.lb}</button>))}</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"10px 16px",position:"relative"}}>
      {onglet==="interventions"&&<div style={{paddingBottom:80}}>
        {(vacation.interventions||[]).length===0&&<div style={{textAlign:"center",color:"#555",marginTop:60,fontSize:14}}>Aucune intervention.<br/><span style={{fontSize:12,color:"#444"}}>Appuie sur ＋</span></div>}
        {(vacation.interventions||[]).map(m=>{const s=STATUTS[m.statut]||STATUTS.en_cours;return(<div key={m.id} style={{background:s.bg,border:"1px solid "+s.color+"44",borderLeft:"4px solid "+s.color,borderRadius:10,padding:14,marginBottom:10}}>
          <div onClick={()=>ouvrirExistante(m)} style={{cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}><span style={{color:GL,fontWeight:700,fontSize:15}}>{m.motif||"Motif non renseigné"}</span><Badge statut={m.statut}/></div><div style={{color:"#999",fontSize:13}}>{m.heure} — {m.lieu||"Lieu non renseigné"}</div><div style={{color:"#777",fontSize:12,marginTop:4}}>{(m.personnes||[]).length} personne(s){m.type_appel?" · "+m.type_appel:""}</div></div>
              <button onClick={e=>{e.stopPropagation();delInterv(m.id);}} style={{background:"none",border:"none",color:"#ff6060",cursor:"pointer",fontSize:18,padding:"0 4px"}}>🗑</button>
            </div>
          </div>
          <div style={{display:"flex",gap:6,marginTop:10}}>{Object.entries(STATUTS).map(([k,st])=>(<button key={k} onClick={e=>{e.stopPropagation();const u=vacation.interventions.map(i=>i.id===m.id?{...i,statut:k}:i);onChange(syncCR({...vacation,interventions:u}));}} style={{flex:1,padding:"6px 4px",borderRadius:8,border:m.statut===k?"2px solid "+st.color:"1px solid rgba(255,255,255,0.1)",background:m.statut===k?st.bg:"rgba(255,255,255,0.03)",color:m.statut===k?st.color:"#666",fontSize:11,fontWeight:m.statut===k?700:400,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>{st.icon} {st.label}</button>))}</div>
        </div>);})}
        <button onClick={ouvrirNouvelle} style={{position:"fixed",bottom:24,right:24,width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#c9a84c,#e8c96a)",border:"none",color:"#1a1206",fontSize:28,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(201,168,76,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>＋</button>
      </div>}
      {onglet==="operations"&&<OngletOps vacation={vacation} onChange={onChange}/>}
      {onglet==="cr"&&<OngletCR vacation={vacation} onChange={onChange} showToast={showToast}/>}
    </div>
  </div>);
}

export default function App(){
  const[ecran,setEcran]=useState("demarrage");
  const[vacation,setVacation]=useState(null);
  const[toast,setToast]=useState(null);
  const[confirmNouvelle,setConfirmNouvelle]=useState(false);
  useEffect(()=>{
    const t=setTimeout(async()=>{
      try{const vc=await window.storage.get("vacation_en_cours");if(vc&&vc.value){setVacation(JSON.parse(vc.value));setEcran("tableau");}}catch{}
    },100);
    return()=>clearTimeout(t);
  },[]);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const saveV=async v=>{try{await window.storage.set("vacation_en_cours",JSON.stringify(v));}catch{}};
  const updateV=async v=>{setVacation(v);await saveV(v);};
  const demarrer=async v=>{setVacation(v);await saveV(v);setEcran("tableau");showToast("Vacation démarrée !");};
  const cloturer=async()=>{try{await window.storage.delete("vacation_en_cours");}catch{}setVacation(null);setEcran("demarrage");showToast("Vacation clôturée !");};
  if(ecran==="creation")return <FormulaireVacation onValider={demarrer} onAnnuler={()=>setEcran("demarrage")}/>;
  if(ecran==="tableau"&&vacation)return(<div style={{height:"100vh",display:"flex",flexDirection:"column",background:BG}}><TableauDeBord vacation={vacation} onChange={updateV} onCloturer={cloturer} showToast={showToast}/><Toast msg={toast}/></div>);
  return(<div style={{minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Georgia',serif",color:TX}}>
    <div style={{width:64,height:64,background:"linear-gradient(135deg,#c9a84c,#e8c96a)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:20}}>🛡</div>
    <div style={{fontWeight:700,fontSize:22,color:GL,letterSpacing:"0.05em",marginBottom:6}}>SAMFO</div>
    <div style={{fontSize:12,color:"#888",letterSpacing:"0.1em",marginBottom:40}}>Système d'Aide au Management des Forces de l'Ordre</div>
    {vacation&&<div style={{width:"100%",maxWidth:400,background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:12,padding:"16px 18px",marginBottom:16}}>
      <div style={{color:GL,fontWeight:700,fontSize:14,marginBottom:4}}>Vacation en cours</div>
      <div style={{color:"#aaa",fontSize:13}}>{vacation.date} — {(vacation.equipages||[{}])[0]?.indicatif||"Sans indicatif"}</div>
      <div style={{color:"#888",fontSize:12,marginTop:2}}>{(vacation.interventions||[]).length} intervention(s)</div>
      <button onClick={()=>setEcran("tableau")} style={{...BP,marginTop:12,fontSize:14}}>Reprendre la vacation</button>
    </div>}
    <div style={{width:"100%",maxWidth:400}}>
      <button onClick={()=>{if(vacation)setConfirmNouvelle(true);else setEcran("creation");}} style={{...BP,background:vacation?"rgba(255,255,255,0.06)":"linear-gradient(135deg,#c9a84c,#e8c96a)",color:vacation?G:"#1a1206",border:vacation?"1px solid rgba(255,200,100,0.3)":"none",fontSize:15}}>{vacation?"Débuter une nouvelle vacation":"🚀 Débuter une vacation"}</button>
    </div>
    {confirmNouvelle&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#1a1206",border:"1px solid rgba(201,168,76,0.4)",borderRadius:14,padding:"24px 20px",width:"100%",maxWidth:380}}>
        <div style={{fontSize:16,fontWeight:700,color:GL,marginBottom:8}}>Nouvelle vacation</div>
        <p style={{color:"#ccc",fontSize:14,marginBottom:20,lineHeight:1.6}}>Une vacation est en cours. Que veux-tu faire ?</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={async()=>{await cloturer();setConfirmNouvelle(false);setEcran("creation");}} style={{...BP,fontSize:14,padding:"12px 0"}}>Sauvegarder et nouvelle vacation</button>
          <button onClick={()=>{setVacation(null);setConfirmNouvelle(false);setEcran("creation");}} style={{background:"rgba(255,100,100,0.12)",border:"1px solid rgba(255,100,100,0.35)",borderRadius:10,color:"#ff8080",fontSize:14,fontWeight:600,padding:"12px 0",cursor:"pointer",fontFamily:"inherit"}}>Ignorer et nouvelle vacation</button>
          <button onClick={()=>setConfirmNouvelle(false)} style={{...BS,padding:"11px 0",textAlign:"center"}}>Annuler</button>
        </div>
      </div>
    </div>}
    <Toast msg={toast}/>
  </div>);
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App/>);
</script>
</body>
</html>
